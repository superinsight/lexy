services:
  lexy:
    build:
      context: ..
      dockerfile: lexy/Dockerfile
    ports:
      - "${PORTAL_PORT:-5174}:5174"
      - "${GATEWAY_PORT:-18789}:18789"
    environment:
      GATEWAY_BIND: lan
      GATEWAY_PORT: "18789"
      PORTAL_PORT: "5174"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
      OPENCLAW_GATEWAY_PASSWORD: "${OPENCLAW_GATEWAY_PASSWORD:-}"
    volumes:
      - lexy-data:/home/node/.openclaw
    init: true
    restart: unless-stopped

volumes:
  lexy-data:
