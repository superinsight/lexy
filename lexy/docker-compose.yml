services:
  lexy:
    build:
      context: ..
      dockerfile: lexy/Dockerfile
    ports:
      - "${PORTAL_PORT:-5174}:5174"
      - "${GATEWAY_PORT:-18789}:18789"
    environment:
      GATEWAY_BIND: lan
      GATEWAY_PORT: "18789"
      PORTAL_PORT: "5174"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
      OPENCLAW_GATEWAY_PASSWORD: "${OPENCLAW_GATEWAY_PASSWORD:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      LEXY_DEFAULT_MODEL: "${LEXY_DEFAULT_MODEL:-}"
      LEXY_PROXY_BASE_URL: "${LEXY_PROXY_BASE_URL:-}"
      LEXY_PROXY_API_KEY: "${LEXY_PROXY_API_KEY:-}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
    volumes:
      - lexy-data:/home/node/.openclaw
    init: true
    restart: unless-stopped

volumes:
  lexy-data:
